<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Message Sent</title>
    <style>
        /* Portfolio Matching Colors */
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary-red: #ff4d4d; /* Bright Red like your buttons */
            --glow: rgba(255, 77, 77, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .thank-you-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px var(--glow);
            transition: transform 0.3s ease;
        }

        .thank-you-card:hover {
            transform: translateY(-10px);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-red);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 25px;
            font-size: 40px;
            box-shadow: 0 0 20px var(--primary-red);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            color: #fff;
        }

        p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 35px;
            background: transparent;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--primary-red);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-red);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon">✓</div>
        <h1>Message Received!</h1>
        <p>Thank you for reaching out. Your message has been successfully delivered. I will review it and get back to you as soon as possible.</p>
        <a href="https://muhammadsohaib7.github.io/portfolio/" class="back-btn">Return to Portfolio</a>
    </div>

</body>
</html>
